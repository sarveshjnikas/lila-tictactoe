services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: nakama
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: localdb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nakama"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql/data

  nakama:
    image: heroiclabs/nakama:3.22.0
    entrypoint:
      - /bin/sh
      - -ec
    volumes:
      - ./local.yml:/nakama/data/local.yml
      - ./modules:/nakama/data/modules
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - >
        /nakama/nakama migrate up --database.address postgres:localdb@postgres:5432/nakama &&
        exec /nakama/nakama --config /nakama/data/local.yml --database.address postgres:localdb@postgres:5432/nakama
    ports:
      - "7349:7349"
      - "7350:7350"
      - "7351:7351"

volumes:
  postgres_data: